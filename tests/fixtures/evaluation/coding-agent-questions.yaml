vault: ../vault-basic
cases:
  - id: recall_sqlite_fts_decision
    mode: recall
    query: sqlite fts index
    max_tokens: 120
    expected_include: [mem_20260430_arch_sqlite]
    expected_exclude: [mem_20260430_old_index]
    expect_explainable: true
  - id: search_markdown_source_truth
    mode: search
    query: markdown source truth
    expected_include: [mem_20260430_arch_markdown]
    expect_explainable: true
  - id: brief_markdown_conflict_warning
    mode: brief
    query: markdown source truth
    include_related: true
    max_tokens: 180
    expected_include: [mem_20260430_arch_markdown]
    expected_warnings:
      - "Conflict detected: mem_20260430_conflict_sqlite contradicts mem_20260430_arch_markdown."
    expect_explainable: true
  - id: recall_json_agent_preference
    mode: recall
    query: json output agent commands
    max_tokens: 90
    expected_include: [mem_20260430_pref_json]
  - id: search_pytest_fixture_preference
    mode: search
    query: pytest fixture tests
    expected_include: [mem_20260430_pref_tests]
  - id: recall_pytest_memory_behavior
    mode: recall
    query: pytest fixture memory behavior
    max_tokens: 90
    expected_include: [mem_20260430_pref_tests]
  - id: search_graph_relation_expansion
    mode: search
    query: graph relation expansion
    expected_include: [mem_20260430_graph_links]
  - id: search_graph_includes_neighbor
    mode: search
    query: graph relation expansion
    include_related: true
    expected_include: [mem_20260430_graph_links, mem_20260430_arch_sqlite]
  - id: recall_graph_includes_neighbor
    mode: recall
    query: graph relation expansion
    include_related: true
    max_tokens: 220
    expected_include: [mem_20260430_graph_links, mem_20260430_arch_sqlite]
  - id: search_sync_rebuild
    mode: search
    query: sync conflicts rebuild
    expected_include: [mem_20260430_sync_remote]
  - id: brief_sync_rebuild
    mode: brief
    query: sync conflicts rebuild
    max_tokens: 140
    expected_include: [mem_20260430_sync_remote]
  - id: recall_hides_superseded_target
    mode: recall
    query: old durable memory sqlite
    max_tokens: 100
    expected_exclude: [mem_20260430_old_index]
  - id: explicit_active_can_find_superseded_target
    mode: search
    query: old durable memory sqlite
    filters:
      status: active
    expected_include: [mem_20260430_old_index]
  - id: search_stale_embedding_provider
    mode: search
    query: stale embedding provider
    filters:
      status: stale
    expected_include: [mem_20260430_stale_embeddings]
  - id: brief_stale_embedding_warning
    mode: brief
    query: stale embedding provider
    filters:
      status: stale
    max_tokens: 120
    expected_include: [mem_20260430_stale_embeddings]
    expected_warnings:
      - "Stale: Stale embedding provider used deterministic local hashes only"
  - id: review_lists_pending_agent
    mode: review
    expected_include: [mem_20260430_pending_agent]
  - id: search_pending_agent_review
    mode: search
    query: agent write review
    filters:
      status: pending
    expected_include: [mem_20260430_pending_agent]
  - id: recall_pending_agent_review
    mode: recall
    query: agent write review
    filters:
      status: pending
    max_tokens: 100
    expected_include: [mem_20260430_pending_agent]
  - id: search_basic_memory_import
    mode: search
    query: basic memory import compatibility
    expected_include: [mem_20260430_import_shape]
  - id: recall_basic_memory_import
    mode: recall
    query: basic memory import compatibility
    max_tokens: 120
    expected_include: [mem_20260430_import_shape]
  - id: search_markdown_export
    mode: search
    query: markdown export compatibility
    expected_include: [mem_20260430_export_shape]
  - id: recall_markdown_export
    mode: recall
    query: markdown export compatibility
    max_tokens: 110
    expected_include: [mem_20260430_export_shape]
  - id: search_recall_policy
    mode: search
    query: automatic recall policy previous decisions project history
    expected_include: [mem_20260430_recall_policy]
  - id: brief_recall_policy
    mode: brief
    query: automatic recall policy previous decisions project history
    max_tokens: 160
    expected_include: [mem_20260430_recall_policy]
  - id: recall_budget_packing
    mode: recall
    query: budget packing token budget deduplicate
    max_tokens: 60
    expected_include: [mem_20260430_budget]
    expect_explainable: true
  - id: search_source_extract_relations
    mode: search
    query: source extract relations
    expected_include: [mem_20260430_import_shape]
  - id: search_managed_vault_source
    mode: search
    query: managed vault source
    expected_include: [mem_20260430_arch_markdown]
  - id: brief_sqlite_superseded_warning
    mode: brief
    query: sqlite fts index
    include_related: true
    max_tokens: 190
    expected_include: [mem_20260430_arch_sqlite]
    expected_warnings:
      - "Superseded memory: mem_20260430_old_index is superseded by mem_20260430_arch_sqlite."
  - id: search_pending_generated_memories
    mode: search
    query: pending generated memories
    filters:
      status: pending
    expected_include: [mem_20260430_pending_agent]
  - id: recall_rebuild_after_sync
    mode: recall
    query: rebuild local index sync
    max_tokens: 110
    expected_include: [mem_20260430_sync_remote]
    expected_exclude: [mem_20260430_old_index]
  - id: brief_conflict_durable_state
    mode: brief
    query: conflict warning durable state
    include_related: true
    max_tokens: 180
    expected_include: [mem_20260430_conflict_sqlite]
    expected_warnings:
      - "Conflict detected: mem_20260430_conflict_sqlite contradicts mem_20260430_arch_markdown."
  - id: search_project_history
    mode: search
    query: project history previous decisions
    expected_include: [mem_20260430_recall_policy]
  - id: recall_brief_citations
    mode: recall
    query: brief citations keys sections
    max_tokens: 90
    expected_include: [mem_20260430_brief_citations]
  - id: search_deterministic_hashes
    mode: search
    query: deterministic local hashes
    filters:
      status: stale
    expected_include: [mem_20260430_stale_embeddings]
  - id: search_yaml_colon_parsing
    mode: search
    query: yaml parsing colons
    expected_include: [mem_20260430_yaml_colon]
  - id: search_schema_migration_metadata
    mode: search
    query: schema migration metadata
    expected_include: [mem_20260430_migrated_pref]
