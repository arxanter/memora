# Ready sample vault config for CLI-first Memora workflows.
# Layout, recall, freshness, and profile tuning use code defaults.
schema_version: 1
default_project: memora

semantic:
  provider: null
  model: local-embedding-model
  command: null

agent_policy:
  aliases:
    - Remi
    - Рэми
    - Реми
  enabled: true
  auto_recall: true
  min_active_confidence: 0.85
  min_pending_confidence: 0.55
